global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: quizizz-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080
        labels:
          application: quizizz
          environment: local

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
